// Task 4
// Create a Object to store Employee Details - name, id, city, state etc
// we need to print keys we have in object - in <UL> - <Li> tag

    let employeeDetails = {
        name : 'Chandrasekhar',

//     Task 3
// create a varibel store current date into it
// Add 2 Months into that day & add 6 days into date..then print new Date in <p> Tag

    var currentDate = new Date();

    currentDate.setMonth(currentDate.getMonth() + 2);

    currentDate.setDate(currentDate.getDate() + 6);

        //Task 2

// Create 4 Text fields to Enter First Name, Middle Name, Last Name, and Mobile No of Customer
// Create a button Generate Unique Id
// Unique Id => current Date day + First 2 Letters of First Name + Last 2 Letters of Last Name + Last 4 Digits of Mobile No - separated by -
// On Change of each textbox, Unique Id should be created and displayed in a <p> tag below

function generateID() {
    const firstName = document.getElementById('txtFName').value;
    const middleName = document.getElementById('txtMName').value;
    const lastName = document.getElementById('txtLName').value;
    const mobileNumber = document.getElementById('txtMOBILE').value;

    let uniqueID = new Date().getDate() + "-" + firstName.slice(0, 2) + "-" + lastName.slice(-2) + "-" + mobileNumber.slice(-4);

    document.getElementById('txtUniqueID').textContent = `Your unique ID is ${uniqueID}`;
}


        // Task 1
//         Create one button Enable Count.
// Create one more button to Record Counts.

        var isEnabled = false;
        function enableCount() {
            isEnabled = true;
            document.getElementById('enableCountbtn').textContent = 'Count Enabled';
        }
        let count = 0;
        function recordCount() {
            if (isEnabled) {
                console.log('button Enabled');
                count++;
            } else {
                alert('Please enable count');
            }
            document.getElementById('countbox').innerText = `You clicked ${count} times`;
